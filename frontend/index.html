<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container dashboard">
    <div class="top-bar">
      <h1>My Expenses</h1>
      <button id="logout-btn" style="width: auto;">Log out</button>
    </div>

    <form class="add-expense-form" id="add-form">
      <div>
        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" min="0" required />
      </div>
      <div>
        <label for="category">Category</label>
        <input type="text" id="category" placeholder="e.g. Food" required />
      </div>
      <div>
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="optional" />
      </div>
      <div>
        <label for="date">Date</label>
        <input type="date" id="date" required />
      </div>
      <button type="submit" style="width: auto;">Add</button>
    </form>
    <p class="error" id="error"></p>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Category</th>
          <th>Description</th>
          <th>Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="expense-rows"></tbody>
    </table>

    <canvas id="category-chart" height="200"></canvas>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
